<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#0b1520"/>

  <!-- House body -->
  <polygon points="32,10 10,28 10,54 54,54 54,28" fill="#111e2d" stroke="#1a8fe3" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Door -->
  <rect x="25" y="38" width="14" height="16" fill="#0b1520" stroke="#1a8fe3" stroke-width="1"/>

  <!-- Left roof (fire side, red tint) -->
  <polygon points="10,28 32,10 32,28" fill="none" stroke="#e85d04" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Right roof (blue side) -->
  <polygon points="32,10 54,28 32,28" fill="none" stroke="#29b6ff" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Fire (left side) -->
  <path d="M17,52 C14,44 12,40 15,34 C15,38 17,38 18,36 C18,42 22,42 21,36 C24,40 23,48 20,52 Z" fill="#e85d04"/>
  <path d="M19,52 C17,47 18,44 20,40 C20,44 22,43 22,41 C24,44 23,49 21,52 Z" fill="#ffc300"/>

  <!-- Lightning bolt (right side) -->
  <path d="M38,18 L33,32 L37,32 L31,46 L44,28 L39,28 Z" fill="white" stroke="#29b6ff" stroke-width="0.5"/>
</svg>
